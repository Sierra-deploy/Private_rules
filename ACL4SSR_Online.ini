[custom]
;不要随意改变关键字
;优化版 - 增强分流规则
;Google/游戏/Apple/Microsoft 分组优化版
; 致谢 / Credits:
;   ACL4SSR - https://github.com/ACL4SSR/ACL4SSR
;   MetaCubeX - https://github.com/MetaCubeX/meta-rules-dat
;

;==================== 设置规则标志位 ====================

;本地和私有网络直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

;基础规则
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

;Google 服务
ruleset=🔎 Google服务,[]GEOSITE,google
ruleset=🔎 Google服务,[]GEOSITE,youtube
ruleset=🔎 Google服务,[]GEOIP,google,no-resolve
ruleset=🔎 Google服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=🔎 Google服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=🔎 Google服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
;EU规则
ruleset=🧭 EU,https://raw.githubusercontent.com/Sierra-deploy/Private_rules/refs/heads/master/EU_bybit.list

;国内直连优化
ruleset=🎯 全球直连,[]GEOSITE,apple-cn
ruleset=🎯 全球直连,[]GEOSITE,microsoft@cn
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

;游戏平台/下载
ruleset=🎮 游戏平台,[]GEOSITE,category-game-platforms-download

;AI 平台
ruleset=💬 Ai平台,[]GEOSITE,openai
ruleset=💬 Ai平台,[]GEOSITE,category-ai-!cn

;银行
ruleset=🏦 银行,https://raw.githubusercontent.com/Sierra-deploy/Private_rules/master/custom.list

;TikTok
ruleset=🎵 TikTok,[]GEOSITE,tiktok

;即时通讯
ruleset=📲 即时通讯,[]GEOSITE,category-communication

;社交媒体
ruleset=🚀 节点选择,[]GEOSITE,category-social-media-!cn

;常用服务
ruleset=🚀 节点选择,[]GEOSITE,github
ruleset=🚀 节点选择,[]GEOSITE,netflix
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=🍎 Apple服务,[]GEOSITE,apple

;GFW 列表
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🚀 节点选择,[]GEOSITE,gfw

;IP 规则
ruleset=📲 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🚀 节点选择,[]GEOIP,netflix,no-resolve
ruleset=🚀 节点选择,[]GEOIP,twitter,no-resolve
ruleset=🚀 节点选择,[]GEOIP,facebook,no-resolve

;国内域名和IP直连
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

;漏网之鱼
ruleset=🐟 漏网之鱼,[]FINAL

;==================== 设置分组标志位 ====================

custom_proxy_group=🚀 节点选择`select`[]🚀 手动切换`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔎 Google服务`select`[]🚀 节点选择`[]🚀 手动切换`[]♻️ 自动选择`(?i).*
custom_proxy_group=🏦 银行`select`[]🚀 节点选择`[]🚀 手动切换`[]♻️ 自动选择
custom_proxy_group=🧭 EU`select`[]🚀 节点选择`[]🚀 手动切换`[]♻️ 自动选择`(?i)DE|AT|FR|UK|EU
custom_proxy_group=🎮 游戏平台`select`[]DIRECT`[]🚀 节点选择`[]🚀 手动切换`[]♻️ 自动选择
custom_proxy_group=🍎 Apple服务`select`[]DIRECT`[]🚀 节点选择`[]🚀 手动切换`[]♻️ 自动选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择`[]🚀 手动切换`[]♻️ 自动选择
custom_proxy_group=💬 Ai平台`select`[]🚀 节点选择`[]🚀 手动切换`[]♻️ 自动选择`(?i).*
custom_proxy_group=🎵 TikTok`select`[]🚀 节点选择`[]🚀 手动切换`[]♻️ 自动选择`(?i).*
custom_proxy_group=📲 即时通讯`select`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
