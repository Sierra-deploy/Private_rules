;==================== 设置规则标志位 ====================

;本地和私有网络直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

;基础规则
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

;国内直连优化
ruleset=🎯 全球直连,[]GEOSITE,google-cn
ruleset=🎯 全球直连,[]GEOSITE,apple-cn
ruleset=🎯 全球直连,[]GEOSITE,microsoft@cn
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

;AI 平台（注意：需放在 Microsoft/Apple 代理规则之前）
ruleset=💬 Ai平台,[]GEOSITE,openai
ruleset=💬 Ai平台,[]GEOSITE,category-ai-!cn

;银行（美国银行，需走代理）
ruleset=🏦 银行,https://raw.githubusercontent.com/Sierra-deploy/Private_rules/master/custom.list

;TikTok
ruleset=🎵 TikTok,[]GEOSITE,tiktok

;即时通讯
ruleset=📲 电报消息,[]GEOSITE,category-communication

;社交媒体
ruleset=🚀 节点选择,[]GEOSITE,category-social-media-!cn

;常用服务
ruleset=🚀 节点选择,[]GEOSITE,github
ruleset=🚀 节点选择,[]GEOSITE,youtube
ruleset=🚀 节点选择,[]GEOSITE,netflix
ruleset=🚀 节点选择,[]GEOSITE,google
ruleset=🚀 节点选择,[]GEOSITE,microsoft
ruleset=🚀 节点选择,[]GEOSITE,apple

;GFW 列表
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🚀 节点选择,[]GEOSITE,gfw

;IP 规则
ruleset=📲 电报消息,[]GEOIP,telegram,no-resolve
ruleset=🚀 节点选择,[]GEOIP,google,no-resolve
ruleset=🚀 节点选择,[]GEOIP,netflix,no-resolve
ruleset=🚀 节点选择,[]GEOIP,twitter,no-resolve
ruleset=🚀 节点选择,[]GEOIP,facebook,no-resolve

;国内域名和IP直连（放在最后兜底）
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

;漏网之鱼
ruleset=🐟 漏网之鱼,[]FINAL

;==================== 设置规则标志位 ====================
;==================== 设置分组标志位 ====================
;==================== 设置分组标志位 ====================
custom_group=🚀 节点选择`select`[]🚀 手动切换`[]DIRECT`[]♻️ 自动选择`.*
custom_group=🚀 手动切换`select`.*
custom_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,,50
custom_group=🏦 银行`select`[]DIRECT`[]🚀 手动切换
custom_group=💬 Ai平台`select`[]🚀 节点选择
custom_group=🎵 TikTok`select`[]🚀 节点选择
custom_group=📲 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择
custom_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
;==================== 设置分组标志位 ====================
;==================== 设置分组标志位 ====================
;==================== 设置分组标志位 ====================

enable_rule_generator=true
overwrite_original_rules=true
